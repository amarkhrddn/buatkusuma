<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kusuma 💖</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        overflow: hidden;
        color: white;
    }

    h1, p {
        opacity: 0;
        transition: 1s;
    }

    .show {
        opacity: 1;
    }

    .gift {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: pointer;
    }

    .box {
        width: 150px;
        height: 150px;
        background: #ff6b81;
        position: relative;
    }

    .lid {
        width: 150px;
        height: 40px;
        background: #ff4757;
        position: absolute;
        top: -40px;
        transition: 0.8s;
    }

    .ribbon {
        width: 20px;
        height: 150px;
        background: white;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .ribbon-h {
        width: 150px;
        height: 20px;
        background: white;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
    }

    .open .lid {
        transform: translateY(-120px) rotate(-20deg);
    }

    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        transform: rotate(45deg);
        animation: float 5s infinite;
    }

    .heart::before,
    .heart::after {
        content: '';
        width: 20px;
        height: 20px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    .heart::before { top: -10px; }
    .heart::after { left: -10px; }

    @keyframes float {
        0% { bottom: -50px; opacity: 0; }
        50% { opacity: 1; }
        100% { bottom: 100%; opacity: 0; transform: translateX(80px) rotate(45deg); }
    }

    .message {
        margin-top: 100px;
    }
</style>
</head>

<body>

<div class="gift" onclick="openGift()">
    <div class="lid"></div>
    <div class="box">
        <div class="ribbon"></div>
        <div class="ribbon-h"></div>
    </div>
</div>

<div class="message">
    <h1 id="title">🎉 Selamat Ulang Tahun Kusuma 💖</h1>
    <p id="text">
        METT ULANG TAHUN YAA BONTOT,, semoga apa yang disemogakan tersemogakan, sehat sehat
        yaa kamu, semangat kerja nya jangan males, sering belajar hal hal baru jangan males explore
        keknya itu aja deh,, woooppppyuuuu kucumaaaaa 😊  
        Semoga semua yang kamu impikan tercapai ❤️
    </p>
</div>

<script>
    function openGift() {
        document.querySelector(".gift").classList.add("open");

        setTimeout(() => {
            document.querySelector(".gift").style.display = "none";
            document.getElementById("title").classList.add("show");
            document.getElementById("text").classList.add("show");
        }, 800);

        startHearts();
    }

    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 5000);
        }, 300);
    }
</script>

</body>
</html>
